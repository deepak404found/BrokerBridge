services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: brokerbridge
      POSTGRES_PASSWORD: brokerbridge
      POSTGRES_DB: brokerbridge
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brokerbridge -d brokerbridge"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - brokerbridge

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - brokerbridge

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.4
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092
      - --advertise-kafka-addr
      - INTERNAL://redpanda:9092,EXTERNAL://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy'"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - brokerbridge

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: lab
      LOG_LEVEL: INFO
      DOCS_ENABLED: "true"
      ADMIN_UI_ENABLED: "true"
      DATABASE_URL: postgresql+asyncpg://brokerbridge:brokerbridge@postgres:5432/brokerbridge
      REDIS_URL: redis://redis:6379/0
      REDPANDA_BROKERS: redpanda:9092
      JWT_SECRET: dev-jwt-secret-change-me-32b-min!!
      SEED_ADMIN_EMAIL: admin@brokerbridge.local
      SEED_ADMIN_PASSWORD: admin123!
      INFRA_PROVIDER: mock
      BROKER_PROVIDER: mock
      LOCK_PROVIDER: redis
      SESSION_PROVIDER: redis
      IP_REUSE_COOLDOWN_HOURS: "24"
      SECRETS_FERNET_KEY: WrU8g7fNF5VR7r_n03I_RXkGAFBhYx0I7WSeeFUeJw4=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - brokerbridge

  worker:
    build: .
    command: ["python", "-m", "app.workers.main"]
    environment:
      APP_ENV: lab
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://brokerbridge:brokerbridge@postgres:5432/brokerbridge
      REDIS_URL: redis://redis:6379/0
      REDPANDA_BROKERS: redpanda:9092
      JWT_SECRET: dev-jwt-secret-change-me-32b-min!!
      SEED_ADMIN_EMAIL: admin@brokerbridge.local
      SEED_ADMIN_PASSWORD: admin123!
      INFRA_PROVIDER: mock
      BROKER_PROVIDER: mock
      LOCK_PROVIDER: redis
      SESSION_PROVIDER: redis
      IP_REUSE_COOLDOWN_HOURS: "24"
      SECRETS_FERNET_KEY: WrU8g7fNF5VR7r_n03I_RXkGAFBhYx0I7WSeeFUeJw4=
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - brokerbridge

networks:
  brokerbridge:
    driver: bridge
